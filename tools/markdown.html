<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown to HTML - Text Toolkit</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <div class="top-bar">
    <select id="languageSelect" class="lang-select">
      <option value="en">English</option>
      <option value="zh">中文</option>
      <option value="es">Español</option>
      <option value="pt">Português</option>
      <option value="ja">日本語</option>
    </select>
    <button id="themeToggle" class="theme-toggle">🌙</button>
  </div>
  <main class="tool-page">
    <a href="../index.html" class="back-link" data-i18n="back">← Back to Toolkit</a>
    <h1 data-i18n="markdown">Markdown to HTML</h1>
    <div class="ad-container"><div class="ad-placeholder">Ad Space</div></div>
    <div class="tool-workspace">
      <div>
        <label data-i18n="input">Input (Markdown)</label>
        <textarea id="input" placeholder="# Hello..."></textarea>
      </div>
      <div>
        <label data-i18n="output">HTML Output</label>
        <textarea id="output" readonly></textarea>
      </div>
    </div>
    <div class="button-group">
      <button class="btn" id="convertBtn" data-i18n="convert">Convert</button>
      <button class="btn btn-outline" id="copyBtn" data-i18n="copy">Copy</button>
      <button class="btn btn-outline" id="clearBtn" data-i18n="clear">Clear</button>
    </div>
    <div class="ad-container"><div class="ad-placeholder">Ad Space</div></div>
  </main>
  <script src="../app.js"></script>
  <script>
    // 简单的 Markdown 转 HTML（粗体、斜体、标题、链接、图片、代码块、换行）
    function simpleMarkdownToHTML(md) {
      let html = md;
      // 代码块
      html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
      // 内联代码
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      // 图片
      html = html.replace(/!\[([^\]]*)\]\(([^\)]+)\)/g, '<img alt="$1" src="$2">');
      // 链接
      html = html.replace(/\[([^\]]+)\]\(([^\)]+)\)/g, '<a href="$2">$1</a>');
      // 标题
      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
      // 粗体
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      // 斜体
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
      // 换行
      html = html.replace(/\n/g, '<br>');
      return html;
    }

    const input = document.getElementById('input');
    const output = document.getElementById('output');
    document.getElementById('convertBtn').addEventListener('click', () => {
      output.value = simpleMarkdownToHTML(input.value);
    });
    document.getElementById('copyBtn').addEventListener('click', () => copyToClipboard(output.value));
    document.getElementById('clearBtn').addEventListener('click', () => { input.value = ''; output.value = ''; });
  </script>
</body>
</html>
