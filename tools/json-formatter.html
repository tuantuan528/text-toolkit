<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON Formatter - Text Toolkit</title>
  <link rel="stylesheet" href="../style.css">

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-N2R40RRRQ0"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-N2R40RRRQ0');
  </script>

  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8884517238295741"
       crossorigin="anonymous"></script>
</head>
<body>
  <div class="top-bar">
    <select id="languageSelect" class="lang-select">
      <option value="en">English</option>
      <option value="zh">中文</option>
      <option value="es">Español</option>
      <option value="pt">Português</option>
      <option value="ja">日本語</option>
    </select>
    <button id="themeToggle" class="theme-toggle">🌙</button>
  </div>
  <main class="tool-page">
    <a href="../index.html" class="back-link" data-i18n="back">← Back to Toolkit</a>
    <h1 data-i18n="jsonFormatter">JSON Formatter</h1>
    <div class="ad-container"><div class="ad-placeholder">Ad Space</div></div>
    <div class="tool-workspace">
      <div>
        <label data-i18n="input">Input</label>
        <textarea id="input" placeholder='{"hello":"world"}'></textarea>
      </div>
      <div>
        <label data-i18n="output">Output</label>
        <textarea id="output" readonly></textarea>
      </div>
    </div>
    <div class="button-group">
      <button class="btn" id="beautifyBtn" data-i18n="beautify">Beautify</button>
      <button class="btn btn-outline" id="minifyBtn" data-i18n="minify">Minify</button>
      <button class="btn btn-outline" id="copyBtn" data-i18n="copy">Copy</button>
      <button class="btn btn-outline" id="clearBtn" data-i18n="clear">Clear</button>
    </div>
    <div class="ad-container"><div class="ad-placeholder">Ad Space</div></div>
  </main>
  <script src="../app.js"></script>
  <script>
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    document.getElementById('beautifyBtn').addEventListener('click', () => {
      try { output.value = JSON.stringify(JSON.parse(input.value), null, 2); } catch(e) { output.value = 'Invalid JSON'; }
    });
    document.getElementById('minifyBtn').addEventListener('click', () => {
      try { output.value = JSON.stringify(JSON.parse(input.value)); } catch(e) { output.value = 'Invalid JSON'; }
    });
    document.getElementById('copyBtn').addEventListener('click', () => copyToClipboard(output.value));
    document.getElementById('clearBtn').addEventListener('click', () => { input.value = ''; output.value = ''; });
  </script>
</body>
</html>
