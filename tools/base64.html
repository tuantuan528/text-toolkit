<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Base64 Encoder/Decoder - Text Toolkit</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <div class="top-bar">
    <select id="languageSelect" class="lang-select">
      <option value="en">English</option>
      <option value="zh">中文</option>
      <option value="es">Español</option>
      <option value="pt">Português</option>
      <option value="ja">日本語</option>
    </select>
    <button id="themeToggle" class="theme-toggle">🌙</button>
  </div>
  <main class="tool-page">
    <a href="../index.html" class="back-link" data-i18n="back">← Back to Toolkit</a>
    <h1 data-i18n="base64">Base64 Encode/Decode</h1>
    <div class="ad-container"><div class="ad-placeholder">Ad Space</div></div>
    <div class="tool-workspace">
      <div>
        <label data-i18n="input">Input</label>
        <textarea id="input" placeholder="Text to encode/decode..."></textarea>
      </div>
      <div>
        <label data-i18n="output">Output</label>
        <textarea id="output" readonly></textarea>
      </div>
    </div>
    <div class="button-group">
      <button class="btn" id="encodeBtn" data-i18n="encode">Encode</button>
      <button class="btn btn-outline" id="decodeBtn" data-i18n="decode">Decode</button>
      <button class="btn btn-outline" id="copyBtn" data-i18n="copy">Copy</button>
      <button class="btn btn-outline" id="clearBtn" data-i18n="clear">Clear</button>
    </div>
    <div class="ad-container"><div class="ad-placeholder">Ad Space</div></div>
  </main>
  <script src="../app.js"></script>
  <script>
    const input = document.getElementById('input');
    const output = document.getElementById('output');
    document.getElementById('encodeBtn').addEventListener('click', () => {
      try { output.value = btoa(unescape(encodeURIComponent(input.value))); } catch(e) { output.value = 'Encoding failed'; }
    });
    document.getElementById('decodeBtn').addEventListener('click', () => {
      try { output.value = decodeURIComponent(escape(atob(input.value))); } catch(e) { output.value = 'Invalid Base64'; }
    });
    document.getElementById('copyBtn').addEventListener('click', () => copyToClipboard(output.value));
    document.getElementById('clearBtn').addEventListener('click', () => { input.value = ''; output.value = ''; });
  </script>
</body>
</html>
